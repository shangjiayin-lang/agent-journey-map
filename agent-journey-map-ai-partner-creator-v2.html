<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ai-partner-creator — Agent Journey Map</title>
<style>
  :root[data-theme="light"] {
    --page-bg:#f8fafc; --toolbar-bg:#ffffff; --toolbar-text:#1e293b; --toolbar-border:#e2e8f0;
    --legend-bg:#ffffff; --legend-text:#1e293b; --legend-border:#cbd5e1;
    --btn-bg:#ffffff; --btn-text:#1e293b; --btn-border:#cbd5e1;
    --btn-active-bg:#2563eb; --btn-active-text:#ffffff;
    --focus-ring:#2563eb; --menu-bg:#ffffff; --menu-text:#1e293b; --menu-border:#cbd5e1;
    --title-g1:#0369a1; --title-g2:#6c47ff;
  }
  :root[data-theme="dark"] {
    --page-bg:#0f172a; --toolbar-bg:#1e293b; --toolbar-text:#e2e8f0; --toolbar-border:#334155;
    --legend-bg:#1e293b; --legend-text:#e2e8f0; --legend-border:#475569;
    --btn-bg:#1e293b; --btn-text:#e2e8f0; --btn-border:#475569;
    --btn-active-bg:#60a5fa; --btn-active-text:#0f172a;
    --focus-ring:#60a5fa; --menu-bg:#1e293b; --menu-text:#e2e8f0; --menu-border:#475569;
    --title-g1:#38bdf8; --title-g2:#a78bfa;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; }
  body {
    background:var(--page-bg); color:var(--toolbar-text);
    font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
    transition:background .2s;
  }
  #toolbar {
    height:56px; flex:0 0 56px; display:flex; align-items:center; gap:8px;
    padding:0 16px; background:var(--toolbar-bg);
    border-bottom:1px solid var(--toolbar-border); z-index:10;
  }
  #toolbar h1 {
    font-size:17px; font-weight:700; margin-right:auto;
    background:linear-gradient(90deg,var(--title-g1),var(--title-g2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .tbtn {
    font-size:13px; padding:7px 12px; border-radius:8px; cursor:pointer;
    background:var(--btn-bg); color:var(--btn-text); border:1px solid var(--btn-border);
  }
  .tbtn:focus-visible { outline:2px solid var(--focus-ring); outline-offset:2px; }
  .tbtn.active { background:var(--btn-active-bg); color:var(--btn-active-text); border-color:var(--btn-active-bg); }
  #canvas-wrap { flex:1; overflow:auto; }
  svg { display:block; }
  #legend {
    position:fixed; right:18px; bottom:18px; z-index:9;
    background:var(--legend-bg); color:var(--legend-text);
    border:1px solid var(--legend-border); border-radius:10px;
    padding:12px 16px; font-size:13px; line-height:1.9; min-width:230px;
  }
  #legend b { display:block; margin-bottom:4px; font-size:13px; }
  .lg-row { display:flex; align-items:center; gap:8px; }
  .lg-swatch { width:14px; height:14px; border-radius:4px; flex:0 0 14px; }
  .lg-line { width:22px; height:0; border-top:2px dashed; flex:0 0 22px; }
  #ctx-menu {
    position:fixed; display:none; z-index:20; min-width:120px;
    background:var(--menu-bg); color:var(--menu-text);
    border:1px solid var(--menu-border); border-radius:8px; overflow:hidden;
    box-shadow:0 6px 24px rgba(0,0,0,.25); font-size:13px;
  }
  #ctx-menu div { padding:9px 14px; cursor:pointer; }
  #ctx-menu div:hover { background:var(--btn-active-bg); color:var(--btn-active-text); }
</style>
</head>
<body>

<div id="toolbar">
  <h1>ai-partner-creator — Agent Journey Map</h1>
  <button class="tbtn active" data-mode="select">选择</button>
  <button class="tbtn" data-mode="add-rect">+矩形</button>
  <button class="tbtn" data-mode="add-diamond">+菱形</button>
  <button class="tbtn" data-mode="add-risk">+风险</button>
  <button class="tbtn" data-mode="connect">连线</button>
  <button class="tbtn" data-mode="delete">删除</button>
  <button class="tbtn" id="export-btn">导出SVG</button>
  <button class="tbtn" id="theme-toggle" aria-label="切换到浅色主题">☀️ Light</button>
</div>

<div id="canvas-wrap">
  <svg id="svg" viewBox="0 0 1820 926" preserveAspectRatio="xMinYMin meet"
       xmlns="http://www.w3.org/2000/svg"
       style="width:100%;height:auto;display:block;overflow:visible;">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6"

  </svg>

  return (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
})();

function theme() { return THEMES[currentTheme]; }

function setTheme(t) {
  currentTheme = t;
  try { localStorage.setItem('ajm-theme', t); } catch (e) {}
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-toggle');

/* ════════════ 布局初始化 ════════════ */
function computeLanePositions() {
  let y = TOOLBAR_H;
  lanes.forEach(lane => { lane.startY = y; y += lane.h; });
  return y;
}

function initNodes(rawNodes) {
  return rawNodes.map(n => {
    const lane = lanes.find(l => l.id === n.lane);
    return Object.assign({}, n, { y: lane.startY + n.y });
  });
}

function nodeColors(node) {
  return theme().nodes[node.role] || theme().nodes.agent;
}

function laneOfY(y) {
  for (const l of lanes) if (y >= l.startY && y < l.startY + l.h) return l;
  return lanes[0];
}

/* ════════════ 坐标转换 ════════════ */
function toSVGPoint(e) {
  const svg = document.getElementById('svg');
  const pt  = svg.createSVGPoint();
  const src = e.touches ? e.touches[0] : e;
  pt.x = src.clientX;
  pt.y = src.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function hitTest(px, py) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (px >= n.x && px <= n.x + n.w && py >= n.y && py <= n.y + n.h) return n;
  }
  return null;
}

/* ════════════ 边路径 ════════════ */
function getEdgePath(edge) {
  const src = nodes.find(n => n.id === edge.from);
  const dst = nodes.find(n => n.id === edge.to);
  if (!src || !dst) return '';
  const sx = src.x + src.w / 2, sy = src.y + src.h / 2;
  const dx = dst.x + dst.w / 2, dy = dst.y + dst.h / 2;
  const diffX = dx - sx, diffY = dy - sy;
  let x1, y1, x2, y2;
  if (Math.abs(diffX) >= Math.abs(diffY) * 0.6) {
    if (diffX >= 0) { x1 = src.x + src.w; y1 = sy; x2 = dst.x;         y2 = dy; }
    else            { x1 = src.x;         y1 = sy; x2 = dst.x + dst.w; y2 = dy; }
    const cp  = Math.abs(x2 - x1) * 0.45;
    const cx1 = x1 + (diffX >= 0 ?  cp : -cp), cy1 = y1;
    const cx2 = x2 + (diffX >= 0 ? -cp :  cp), cy2 = y2;
    return 'M' + x1 + ',' + y1 + ' C' + cx1 + ',' + cy1 + ' ' + cx2 + ',' + cy2 + ' ' + x2 + ',' + y2;
  } else {
    if (diffY >= 0) { x1 = sx; y1 = src.y + src.h; x2 = dx; y2 = dst.y; }
    else            { x1 = sx; y1 = src.y;         x2 = dx; y2 = dst.y + dst.h; }
    const cp  = Math.abs(y2 - y1) * 0.45;
    const cy1 = y1 + (diffY >= 0 ?  cp : -cp);
    const cy2 = y2 + (diffY >= 0 ? -cp :  cp);
    return 'M' + x1 + ',' + y1 + ' C' + x1 + ',' + cy1 + ' ' + x2 + ',' + cy2 + ' ' + x2 + ',' + y2;
  }
}

function edgeMidpoint(edge) {
  const src = nodes.find(n => n.id === edge.from);
  const dst = nodes.find(n => n.id === edge.to);
  if (!src || !dst) return { x:0, y:0 };
  return { x:(src.x + src.w/2 + dst.x + dst.w/2)/2, y:(src.y + src.h/2 + dst.y + dst.h/2)/2 };
}

/* ════════════ 渲染（唯一 DOM 写入入口）════════════ */
function el(tag, attrs) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

function drawLane(parent, lane) {
  const th = theme();
  const lc = th.lanes[lane.id] || { bg: th.canvasBg, hdr: th.toolbarBg };
  parent.appendChild(el('rect', { x:0, y:lane.startY, width:CANVAS_W, height:lane.h,
    fill:lc.bg, stroke:th.toolbarBorder, 'stroke-width':1 }));
  parent.appendChild(el('rect', { x:0, y:lane.startY, width:LBL_W, height:lane.h, fill:lc.hdr }));
  const labelColor = (currentTheme === 'light') ? th.laneLabelText : (lc.labelText || th.legendText);
  const cx = LBL_W / 2, cy = lane.startY + lane.h / 2;
  const linesArr = lane.name.split('\n');
  const t = el('text', { 'text-anchor':'middle', 'font-size':'13', 'font-weight':'600',
    fill:labelColor, transform:'rotate(-90 ' + cx + ' ' + cy + ')', 'pointer-events':'all',
    'font-family':'system-ui, -apple-system, sans-serif' });
  t.style.cursor = 'pointer';
  linesArr.forEach((line, i) => {
    const ts = el('tspan', { x:cx, y:cy + (i - (linesArr.length - 1)/2) * 16 + 4 });
    ts.textContent = line;
    t.appendChild(ts);
  });
  t.addEventListener('dblclick', ev => {
    ev.stopPropagation();
    const zh = prompt('泳道中文名：', linesArr[0]); if (zh === null) return;
    const en = prompt('泳道英文名：', linesArr[1] || ''); if (en === null) return;
    lane.name = zh + '\n' + en;
    render();
  });
  parent.appendChild(t);
}

function drawEdge(parent, edge) {
  const th = theme();
  const d = getEdgePath(edge);
  if (!d) return;
  const p = el('path', { d:d, fill:'none',
    stroke: edge.dashed ? th.edgeDashed : th.edge, 'stroke-width':1.5,
    'marker-end': edge.dashed ? 'url(#arrowhead-dashed)' : 'url(#arrowhead)' });
  if (edge.dashed) p.setAttribute('stroke-dasharray', '6,4');
  parent.appendChild(p);
  if (edge.label) {
    const m = edgeMidpoint(edge);
    const bg = el('rect', { x:m.x - edge.label.length*7 - 4, y:m.y - 10,
      width: edge.label.length*14 + 8, height:20, rx:4,
      fill: th.canvasBg, 'fill-opacity':0.92 });
    parent.appendChild(bg);
    const t = el('text', { x:m.x, y:m.y + 4, 'text-anchor':'middle', 'font-size':'12',
      fill:th.edgeLabel, 'font-family':'system-ui, -apple-system, sans-serif' });
    t.style.cursor = 'pointer';
    t.textContent = edge.label;
    t.addEventListener('dblclick', ev => {
      ev.stopPropagation();
      const v = prompt('边标签：', edge.label);
      if (v !== null) { edge.label = v; render(); }
    });
    parent.appendChild(t);
  }
}

function drawNode(parent, node) {
  const th = theme();
  const c = nodeColors(node);
  const sel = node.id === selectedId || node.id === (connectFrom && connectFrom.id);
  const strokeColor = sel ? th.selection : c.stroke;
  const strokeW = sel ? 3 : 1.8;
  let shape;
  if (node.type === 'diamond') {
    const cx = node.x + node.w/2, cy = node.y + node.h/2;
    shape = el('polygon', { points:
      cx + ',' + node.y + ' ' + (node.x + node.w) + ',' + cy + ' ' +
      cx + ',' + (node.y + node.h) + ' ' + node.x + ',' + cy,
      fill:c.fill, stroke:strokeColor, 'stroke-width':strokeW });
  } else if (node.type === 'note') {
    const fold = 14, x = node.x, y = node.y, w = node.w, h = node.h;
    shape = el('path', { d:'M' + x + ',' + y + ' h' + (w - fold) + ' l' + fold + ',' + fold +
      ' v' + (h - fold) + ' h-' + w + ' z',
      fill:c.fill, stroke:strokeColor, 'stroke-width':strokeW });
  } else if (node.type === 'message') {
    shape = el('rect', { x:node.x, y:node.y, width:node.w, height:node.h, rx:node.h/2,
      fill:c.fill, stroke:strokeColor, 'stroke-width':strokeW });
  } else {
    shape = el('rect', { x:node.x, y:node.y, width:node.w, height:node.h, rx:10,
      fill:c.fill, stroke:strokeColor, 'stroke-width':strokeW });
  }
  shape.style.cursor = 'move';
  shape.dataset.nodeId = node.id;
  parent.appendChild(shape);
  renderNodeText(parent, node);
}

function renderNodeText(parent, node) {
  const cx = node.x + node.w / 2;
  const cy = node.y + node.h / 2;
  const linesArr = node.text.split('\n');
  const lineH = 16;
  const startY = cy - ((linesArr.length - 1) * lineH) / 2;
  const t = el('text', { 'text-anchor':'middle', 'dominant-baseline':'middle',
    'font-size':'13', 'font-family':'system-ui, -apple-system, sans-serif',
    fill: nodeColors(node).text, 'pointer-events':'none' });
  linesArr.forEach((line, i) => {
    const ts = el('tspan', { x:cx, y:startY + i * lineH });
    ts.textContent = line;
    t.appendChild(ts);
  });
  parent.appendChild(t);
}

function render() {
  const dynamicLayer = document.getElementById('dynamic-layer');
  dynamicLayer.innerHTML = '';
  lanes.forEach(lane => drawLane(dynamicLayer, lane));
  edges.forEach(edge => drawEdge(dynamicLayer, edge));
  nodes.forEach(node => drawNode(dynamicLayer, node));
}

/* ════════════ 交互 ════════════ */
let dragState = null;
const svg = document.getElementById('svg');
const ctxMenu = document.getElementById('ctx-menu');
let ctxTarget = null;

function onDragStart(e) {
  if (e.button === 2) return;
  hideCtx();
  const pt = toSVGPoint(e);
  const node = hitTest(pt.x, pt.y);

  if (mode === 'select') {
    if (!node) { selectedId = null; render(); return; }
    e.preventDefault();
    selectedId = node.id;
    dragState = { node:node, dx:pt.x - node.x, dy:pt.y - node.y, moved:false };
    render();
  } else if (mode === 'connect') {
    if (!node) { connectFrom = null; render(); return; }
    e.preventDefault();
    if (!connectFrom) { connectFrom = node; render(); }
    else if (connectFrom.id !== node.id) {
      edges.push({ id:'e' + (idSeq++), from:connectFrom.id, to:node.id, label:'',
        dashed:(connectFrom.lane === 'risk' || node.lane === 'risk') });
      connectFrom = null;
      render();
    }
  } else if (mode === 'delete') {
    if (node) deleteNode(node);
  } else if (mode === 'add-rect' || mode === 'add-diamond' || mode === 'add-risk') {
    if (node) return;
    e.preventDefault();
    const lane = laneOfY(pt.y);
    const isDiamond = mode === 'add-diamond';
    const isRisk = mode === 'add-risk';
    const w = isDiamond ? 160 : 200, h = isDiamond ? 80 : 60;
    nodes.push({
      id:'n' + (idSeq++), lane:lane.id,
      x:pt.x - w/2, y:pt.y - h/2, w:w, h:h,
      type: isRisk ? 'note' : (isDiamond ? 'diamond' : 'rect'),
      role: isRisk ? 'risk' : (lane.id === 'risk' ? 'mitigation' : (theme().nodes[lane.id] ? lane.id : 'agent')),
      text: isRisk ? '⚠ 新风险' : (isDiamond ? '判断?' : '新节点')
    });
    render();
  }
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const pt = toSVGPoint(e);
  dragState.node.x = pt.x - dragState.dx;
  dragState.node.y = pt.y - dragState.dy;
  dragState.moved = true;
  render();
}

function onDragEnd() { dragState = null; }

function deleteNode(node) {
  nodes = nodes.filter(n => n.id !== node.id);
  edges = edges.filter(ed => ed.from !== node.id && ed.to !== node.id);
  if (selectedId === node.id) selectedId = null;
  render();
}

function editNode(node) {
  const v = prompt('节点文字（用 \\n 换行）：', node.text.replace(/\n/g, '\\n'));
  if (v !== null) { node.text = v.replace(/\\n/g, '\n'); render(); }
}

svg.addEventListener('mousedown', onDragStart);
svg.addEventListener('touchstart', onDragStart, { passive:false });
document.addEventListener('mousemove', onDragMove);
document.addEventListener('touchmove', onDragMove, { passive:false });
document.addEventListener('mouseup', onDragEnd);
document.addEventListener('touchend', onDragEnd);

svg.addEventListener('dblclick', e => {
  const pt = toSVGPoint(e);
  const node = hitTest(pt.x, pt.y);
  if (node) editNode(node);
});

svg.addEventListener('contextmenu', e => {
  const pt = toSVGPoint(e);
  const node = hitTest(pt.x, pt.y);
  if (!node) { hideCtx(); return; }
  e.preventDefault();
  ctxTarget = node;
  ctxMenu.style.display = 'block';
  ctxMenu.style.left = e.clientX + 'px';
  ctxMenu.style.top  = e.clientY + 'px';
});

function hideCtx() { ctxMenu.style.display = 'none'; ctxTarget = null; }
document.getElementById('ctx-edit').addEventListener('click', () => { if (ctxTarget) editNode(ctxTarget); hideCtx(); });
document.getElementById('ctx-del').addEventListener('click',  () => { if (ctxTarget) deleteNode(ctxTarget); hideCtx(); });
document.addEventListener('click', e => { if (!ctxMenu.contains(e.target)) hideCtx(); });

/* 工具模式切换 */
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    connectFrom = null;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });
});

/* 导出 SVG（使用当前主题颜色） */
document.getElementById('export-btn').addEventListener('click', () => {
  const clone = svg.cloneNode(true);
  const bg = document.createElementNS(SVGNS, 'rect');
  const vb = svg.getAttribute('viewBox').split(' ');
  bg.setAttribute('x', 0); bg.setAttribute('y', 0);
  bg.setAttribute('width', vb[2]); bg.setAttribute('height', vb[3]);
  bg.setAttribute('fill', theme().canvasBg);
  clone.insertBefore(bg, clone.firstChild.nextSibling);
  const blob = new Blob(
    ['<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone)],
    { type:'image/svg+xml;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'agent-journey-map-ai-partner-creator-' + currentTheme + '.svg';
  a.click();
  URL.revokeObjectURL(a.href);
});

/* 主题切换按钮 */
document.getElementById('theme-toggle').addEventListener('click', () => {
  setTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

/* ════════════ 启动 ════════════ */
window.addEventListener('load', () => {
  const totalH = computeLanePositions();
  document.getElementById('svg').setAttribute('viewBox', '0 0 ' + CANVAS_W + ' ' + totalH);
  nodes = initNodes(RAW_NODES);
  setTheme(currentTheme); // 同步按钮文案、marker、legend，并完成首次 render
});
</script>
</body>
</html>
